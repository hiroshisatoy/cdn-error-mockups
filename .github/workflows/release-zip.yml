name: Release plugin zip
on:
    push:
        tags:
            - 'v*'
permissions:
    contents: write
jobs:
    zip:
        name: Build and attach zip
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.ref }}
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - run: deno install
            - run: deno task build
            - run: deno task plugin-zip
            - name: Verify zip
              run: test -f cdn-error-mockups.zip && ls -la cdn-error-mockups.zip
            - name: Create or update GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ github.ref_name }}"
                  if gh release view "$TAG" >/dev/null 2>&1; then
                    gh release upload "$TAG" cdn-error-mockups.zip --clobber
                  else
                    gh release create "$TAG" cdn-error-mockups.zip --generate-notes --title "$TAG"
                  fi
